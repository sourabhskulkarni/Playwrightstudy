name: Performance Tests with K6

on:
  push:
    branches: [ main, master ]
    paths:
      - 'performance/**'
      - 'playwright.config.ts'
      - 'package.json'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  performance:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # Install K6
    - name: Install K6
      run: |
        sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install -y k6
    
    # Run K6 Load Test
    - name: Run K6 Load Test
      run: k6 run performance/k6/load-test.js
      continue-on-error: true
    
    # Run K6 Stress Test
    - name: Run K6 Stress Test
      run: k6 run performance/k6/stress-test.js
      continue-on-error: true
    
    # Run K6 Spike Test
    - name: Run K6 Spike Test
      run: k6 run performance/k6/spike-test.js
      continue-on-error: true
    
    # Run K6 Idempotency Test
    - name: Run K6 Idempotency Test
      run: k6 run performance/k6/idempotency-test.js
      continue-on-error: true
    
    - name: Create GitHub Issue on Performance Failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `📊 Performance Test Failed - ${new Date().toLocaleDateString()}`,
            body: `## Performance Test Failure Notification\n\n**Workflow:** Performance Tests with K6\n**Run ID:** ${context.runId}\n**Commit:** ${context.sha}\n\n[View Details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n**Action:** Please review K6 performance test failures.`
          })
