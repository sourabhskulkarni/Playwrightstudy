name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      continue-on-error: true  # UI tests may fail due to site blocking automated browsers
    - name: Run Day 1 BDD tests
      if: always()
      run: npm run test:bdd:day1
      continue-on-error: true
    - name: Run Day 2 BDD tests
      if: always()
      run: npm run test:bdd:day2
      continue-on-error: true
    - name: Run Day 3 BDD tests
      if: always()
      run: npm run test:bdd:day3
      continue-on-error: true
    - name: Run Day 5 BDD tests (Gen AI)
      if: always()
      run: npm run test:bdd:day5
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: |
          playwright-report/
          reports/
        retention-days: 30
