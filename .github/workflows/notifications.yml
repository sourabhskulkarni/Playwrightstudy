name: Test Notifications & Reporting

# This workflow sends notifications when tests fail
# Customize with your own notification method (Slack, Teams, Discord, Email)

on:
  workflow_run:
    workflows: 
      - "Playwright Tests"
      - "Scheduled Playwright Tests"
      - "Performance Tests with K6"
    types:
      - completed

jobs:
  notify-on-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    
    steps:
    - name: Notify via GitHub Issue
      uses: actions/github-script@v7
      with:
        script: |
          const workflow = '${{ github.event.workflow_run.name }}';
          const status = '${{ github.event.workflow_run.conclusion }}';
          
          if (status === 'failure') {
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 ${workflow} Failed`,
              body: `## Test Failure Alert\n\n**Workflow:** ${workflow}\n**Status:** ${status.toUpperCase()}\n**Run ID:** ${context.payload.workflow_run.id}\n**Branch:** ${context.payload.workflow_run.head_branch}\n\n[View Full Details](${context.payload.workflow_run.html_url})\n\n---\n\n**💡 Next Steps:**\n1. Click the link above to view detailed test results\n2. Check the test logs for specific failures\n3. Fix the failing tests locally\n4. Push the fix to trigger tests again`
            })
          }
    
    # Optional: Add Slack notification (uncomment and configure if you use Slack)
    # - name: Notify Slack on Failure
    #   if: failure()
    #   uses: slackapi/slack-github-action@v1
    #   with:
    #     webhook-url: ${{ secrets.SLACK_WEBHOOK }}
    #     payload: |
    #       {
    #         "text": "🔴 Test Failure Alert",
    #         "blocks": [
    #           {
    #             "type": "section",
    #             "text": {
    #               "type": "mrkdwn",
    #               "text": "*Workflow:* ${{ github.event.workflow_run.name }}\n*Status:* Failed\n*Branch:* ${{ github.event.workflow_run.head_branch }}"
    #             }
    #           }
    #         ]
    #       }

  notify-on-success:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: Log Success
      run: |
        echo "✅ Workflow '${{ github.event.workflow_run.name }}' completed successfully!"
        echo "Branch: ${{ github.event.workflow_run.head_branch }}"
        echo "Commit: ${{ github.event.workflow_run.head_commit.message }}"
    
    # Optional: Comment on PR with success message
    - name: Comment on PR with Success
      if: github.event.workflow_run.event == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          console.log('✅ All tests passed successfully!');
